name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
  push:
    branches: [ "dev/**" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.88.0
  TAPLO_VERSION: 0.10.0

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - name: Install rustfmt
        run: rustup toolchain install "$(cat RUSTFMT_VERSION)" --profile minimal --component rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Taplo
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: taplo-cli@${{ env.TAPLO_VERSION }}
      - name: Install documentation tools
        run: sudo apt-get update && sudo apt-get install --yes scdoc
      - name: Check toolchain policy
        run: |
          test "$(rustc --version | cut -d ' ' -f 2)" = "$RUST_VERSION"
          msrv=$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[0].rust_version')
          test "$msrv" = "${RUST_VERSION%.*}"
      - name: Check formatting
        run: cargo "+$(cat RUSTFMT_VERSION)" fmt --all --check
      - name: Check TOML formatting
        run: taplo fmt --check Cargo.toml .taplo.toml Cross.toml rust-toolchain.toml
      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --locked --all-features
      - name: Test release process boundary
        run: cargo test --locked --release --all-features --test process
      - name: Check man page
        run: scdoc < contrib/man/tuigreet-1.scd > /dev/null
      - name: Build release binary
        run: cargo build --locked --release
