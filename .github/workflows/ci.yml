name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
  push:
    branches: [ "dev/**" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.88.0
  RUSTFMT_TOOLCHAIN: nightly-2026-07-15

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RUSTFMT_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install test tools
        run: sudo apt-get update && sudo apt-get install --yes libnss-wrapper scdoc
      - name: Check toolchain policy
        run: |
          test "$(rustc --version | cut -d ' ' -f 2)" = "$RUST_VERSION"
          msrv=$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[0].rust_version')
          test "$msrv" = "${RUST_VERSION%.*}"
      - name: Check formatting
        run: cargo "+$RUSTFMT_TOOLCHAIN" fmt --all --check
      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test
        env:
          NSS_WRAPPER_PASSWD: contrib/fixtures/passwd
          NSS_WRAPPER_GROUP: contrib/fixtures/group
          LD_PRELOAD: libnss_wrapper.so
        run: cargo test --locked --all-features
      - name: Check man page
        run: scdoc < contrib/man/tuigreet-1.scd > /dev/null
      - name: Build release binary
        run: cargo build --locked --release
